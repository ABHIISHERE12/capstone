name: TeamFlow CI/CD

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Test Backend
  # ─────────────────────────────────────────
  backend-ci:
    name: Backend — Install & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_for_ci
        run: npm test

  # ─────────────────────────────────────────
  # JOB 2: Lint & Build Frontend
  # ─────────────────────────────────────────
  frontend-ci:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_API_URL: https://teamflow-api.onrender.com/api
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 3: Build & Push Docker Images
  # Only runs on push to master/main
  # Steps check secrets via env vars (secrets context not allowed in job if)
  # ─────────────────────────────────────────
  docker-build:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: >
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') &&
      github.event_name == 'push'
    continue-on-error: true
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Check Docker Hub secrets are set
        if: env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == ''
        run: |
          echo "::warning::DOCKERHUB_USERNAME or DOCKERHUB_TOKEN secret is not set — skipping Docker push"
          exit 0

      - name: Checkout code
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push backend image
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/teamflow-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/teamflow-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push frontend image
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=https://teamflow-api.onrender.com/api
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/teamflow-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/teamflow-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 4: Deploy Backend to Render
  # ─────────────────────────────────────────
  deploy-backend:
    name: Deploy — Backend (Render)
    runs-on: ubuntu-latest
    needs: [backend-ci]
    if: >
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') &&
      github.event_name == 'push'
    continue-on-error: true
    env:
      RENDER_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}

    steps:
      - name: Check Render secret is set
        if: env.RENDER_HOOK == ''
        run: |
          echo "::warning::RENDER_DEPLOY_HOOK_BACKEND secret is not set — skipping Render deploy"
          exit 0

      - name: Trigger Render deploy hook
        if: env.RENDER_HOOK != ''
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" \
            -H "Content-Type: application/json" \
            --fail-with-body

  # ─────────────────────────────────────────
  # JOB 5: Deploy Frontend to Vercel
  # ─────────────────────────────────────────
  deploy-frontend:
    name: Deploy — Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [frontend-ci]
    if: >
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') &&
      github.event_name == 'push'
    continue-on-error: true
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Check Vercel secrets are set
        if: env.VERCEL_TOKEN == ''
        run: |
          echo "::warning::VERCEL_TOKEN secret is not set — skipping Vercel deploy"
          exit 0

      - name: Checkout code
        if: env.VERCEL_TOKEN != ''
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (Production)
        if: env.VERCEL_TOKEN != ''
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
